name: Build Portable App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile Java
        run: javac InventoryApp.java

      - name: Create Build Folder
        run: mkdir build

      - name: Create JAR
        run: jar cfe build/InventoryApp.jar InventoryApp InventoryApp.class

      - name: Generate Portable App
        run: |
          jpackage `
          --input build `
          --name InventoryApp `
          --main-jar InventoryApp.jar `
          --main-class InventoryApp `
          --type app-image

      - name: Upload Portable App
        uses: actions/upload-artifact@v4
        with:
          name: InventoryApp-Portable
          path: InventoryApp/**
